name: 台股主力狙擊機器人

on:
  schedule:
    # 1. 台灣時間 上午 08:30 (盤前定錨：關注前一天收盤與社群狀況)
    - cron: '28 0 * * 1-5'
    
    # 2. 台灣時間 上午 09:30 (早盤強勢動能確立)
    - cron: '28 1 * * 1-5'
    
    # 3. 台灣時間 上午 10:45 (盤中洗盤、主力轉折)
    - cron: '43 2 * * 1-5'
    
    # 4. 台灣時間 中午 12:00 (午盤多空拉鋸、尋找潛伏股)
    - cron: '58 3 * * 1-5'
    
    # 5. 台灣時間 下午 13:15 (收盤前最後突襲：鎖定尾盤強勢標的)
    - cron: '12 5 * * 1-5'
  
  # 保持手動執行功能
  workflow_dispatch: 

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: 下載程式碼
        uses: actions/checkout@v4

      - name: 安裝 Python 環境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # 🚀 核心黑科技：只要 requirements.txt 沒變，自動從雲端保險箱秒級載入套件！

      - name: 安裝必備套件
        run: |
          pip install -r requirements.txt

      - name: 啟動狙擊機器人！
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_BACKUP: ${{ secrets.GEMINI_API_KEY_BACKUP }}
          FUGLE_API_KEY: ${{ secrets.FUGLE_API_KEY }}
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: |
          python sniper_bot.py
