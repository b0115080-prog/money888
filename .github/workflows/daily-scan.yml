name: 台股主力狙擊機器人

on:
  # 🚀 關鍵天線：專門接收從 Google Apps Script 或 Streamlit 傳來的 204 特權暗號
  repository_dispatch:
    types: [google_track_trigger]
  
  # 保持手動執行功能 (讓你依然可以在 GitHub 網頁後台手動點擊)
  workflow_dispatch: 

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: 下載程式碼
        uses: actions/checkout@v4

      - name: 安裝 Python 環境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # 🚀 核心黑科技：只要 requirements.txt 沒變，自動從雲端保險箱秒級載入套件！

      - name: 安裝必備套件
        run: |
          pip install -r requirements.txt

      - name: 啟動狙擊機器人！
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_BACKUP: ${{ secrets.GEMINI_API_KEY_BACKUP }}
          FUGLE_API_KEY: ${{ secrets.FUGLE_API_KEY }}
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: |
          python sniper_bot.py
